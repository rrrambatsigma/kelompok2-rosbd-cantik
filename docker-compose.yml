networks:
  flight-net:
    driver: bridge

volumes:
  elasticsearch-data:
  grafana-data:
  zookeeper-data:
  kafka-data:

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:6.2.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-data:/var/lib/zookeeper/log
    networks:
      - flight-net

  kafka:
    image: confluentinc/cp-kafka:6.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - flight-net
    depends_on:
      - zookeeper

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    networks:
      - flight-net

  spark:
    image: jupyter/pyspark-notebook:latest
    container_name: spark
    ports:
      - "8888:8888"
      - "4040:4040"
    networks:
      - flight-net

  sedona:
    image: apache/sedona:latest
    container_name: sedona
    ports:
      - "8081:8080"
    networks:
      - flight-net
    command: ["tail", "-f", "/dev/null"]

  neug:
    image: alpine:latest
    container_name: neug
    command: ["tail", "-f", "/dev/null"]
    networks:
      - flight-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - flight-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - flight-net

  ingester:
    build: .
    container_name: ingester
    depends_on:
      - kafka
      - elasticsearch
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ELASTICSEARCH_HOST=elasticsearch:9200
    volumes:
      - ./credentials.json:/app/credentials.json
    command: ["python", "-u", "ingester.py"]
    networks:
      - flight-net

  optimizer:
    build: .
    container_name: optimizer
    ports:
      - "8000:8000"
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOST=elasticsearch:9200
    command: ["uvicorn", "optimizer:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - flight-net

  anomaly:
    build: .
    container_name: anomaly
    depends_on:
      - kafka
      - elasticsearch
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ELASTICSEARCH_HOST=elasticsearch:9200
    command: ["python", "anomaly.py"]
    networks:
      - flight-net

  saver:
    build: .
    container_name: saver
    depends_on:
      - kafka
      - elasticsearch
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - ELASTICSEARCH_HOST=elasticsearch:9200
      - TELEGRAM_BOT_TOKEN=8728781688:AAGpad63jzYWEDDfi5i22SOIDIRcVeoDqCE
      - TELEGRAM_CHAT_ID=7587791731
    command: ["python", "-u", "saver.py"]
    networks:
      - flight-net